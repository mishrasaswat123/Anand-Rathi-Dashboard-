<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Advisor Brain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 16px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .highlight {
      background: #22c55e;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .risk {
      color: #ef4444;
      font-weight: bold;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: white;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    ul {
      padding-left: 18px;
    }
  </style></head><body>
<div class="container">  <div class="card">
    <h2>📢 TODAY'S CALL</h2>
    <div id="call"></div>
    <p><b>Horizon:</b> <span id="horizon"></span></p>
    <p><b>Confidence:</b> <span id="confidence"></span></p>
  </div>  <div class="card">
    <h2>🧠 Why this call?</h2>
    <ul id="reasons"></ul>
  </div>  <div class="card">
    <h2>🔗 Impact Chain</h2>
    <ul id="impact"></ul>
  </div>  <div class="card">
    <h2>⚠️ Risk Factors</h2>
    <ul id="risk"></ul>
  </div>  <div class="card">
    <h2>📩 Client Message</h2>
    <p id="message"></p>
    <button onclick="copyMessage()">Copy Message</button>
  </div></div><script>

const API = "http://13.61.104.101:5000/brain"; // ✅ YOUR PUBLIC IP

async function loadData() {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        liquidity: "STRONG",
        rates: "RISING",
        crude: "RISING",
        fii: "SELLING"
      })
    });

    const data = await res.json();

    // Populate CALL
    const callDiv = document.getElementById("call");
    callDiv.innerHTML = "";
    data.call.forEach(c => {
      const div = document.createElement("div");
      div.className = "highlight";
      div.innerText = c;
      callDiv.appendChild(div);
    });

    // Basic fields
    document.getElementById("horizon").innerText = data.horizon;
    document.getElementById("confidence").innerText = data.confidence;

    // Helper for lists
    function fillList(id, arr) {
      const el = document.getElementById(id);
      el.innerHTML = "";
      arr.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item;
        el.appendChild(li);
      });
    }

    fillList("reasons", data.reasons);
    fillList("impact", data.impact);
    fillList("risk", data.risk);

    document.getElementById("message").innerText = data.message;

  } catch (err) {
    console.error(err);
    alert("API connection failed. Check CORS or port settings.");
  }
}

function copyMessage() {
  const text = document.getElementById("message").innerText;
  navigator.clipboard.writeText(text);
  alert("Message copied");
}

// Load on start
loadData();

</script></body>
</html>
