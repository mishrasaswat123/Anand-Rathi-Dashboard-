<!DOCTYPE html>
<html>
<head>
  <title>DSS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family: Arial; padding: 20px;">

<h2>📊 Trading Intelligence Dashboard</h2>

<input id="symbol" placeholder="Enter Stock (e.g. RELIANCE)">
<button onclick="fetchData()">Analyze</button>

<h3 id="price"></h3>
<h3 id="signal"></h3>
<h3 id="score"></h3>
<h3 id="prob"></h3>
<h3 id="risk"></h3>
<h3 id="alloc"></h3>
<h4 id="source"></h4>

<canvas id="chart" width="400" height="200"></canvas>

<script>
async function fetchData() {
  const symbol = document.getElementById("symbol").value;

  const res = await fetch(`https://13.61.104.101.nip.io/api/signal?symbol=${symbol}`);
  const data = await res.json();

  document.getElementById("price").innerText = "Price: " + data.price;
  document.getElementById("signal").innerText = "Signal: " + data.signal;
  document.getElementById("score").innerText = "Score: " + data.score;
  document.getElementById("prob").innerText =
    `Prob ↑ ${data.probability.up}% | ↓ ${data.probability.down}%`;
  document.getElementById("risk").innerText =
    "Risk-Reward: " + data.riskReward;
  document.getElementById("alloc").innerText =
    "Allocation: " + data.allocation;
  document.getElementById("source").innerText =
    "Data Source: " + data.source;

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: ["Now"],
      datasets: [{
        label: symbol,
        data: [data.price]
      }]
    }
  });
}
</script>

</body>
</html>
