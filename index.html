<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSS Engine</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1623;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: #1c2a44;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.status {
    font-size: 18px;
    margin-top: 10px;
}

.output {
    margin-top: 20px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📡 Live DSS Engine</h2>
<div id="status" class="status">🔴 Disconnected</div>
</div>

<button onclick="runDSS()">Run DSS</button>

<div id="output" class="card output"></div>

</div>

<script>

// 🔥 PUT YOUR NGROK URL HERE
const API = "https://gutless-mongoose-perfectly.ngrok-free.app/brain";

async function runDSS() {

    const statusDiv = document.getElementById("status");
    const outputDiv = document.getElementById("output");

    statusDiv.innerHTML = "🟡 Connecting...";

    try {

        const payload = {
            liquidity: "STRONG",
            rates: "RISING",
            crude: "RISING",
            fii: "SELLING"
        };

        const res = await fetch(API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("API error");

        const data = await res.json();

        statusDiv.innerHTML = "🟢 Connected";

        outputDiv.innerHTML = `
            <h3>📊 DSS Recommendation</h3>
            <b>Call:</b> ${data.call.join(", ")}<br><br>
            <b>Horizon:</b> ${data.horizon}<br><br>
            <b>Confidence:</b> ${data.confidence}<br><br>

            <b>Reasons:</b>
            <ul>${data.reasons.map(r => `<li>${r}</li>`).join("")}</ul>

            <b>Impact:</b>
            <ul>${data.impact.map(i => `<li>${i}</li>`).join("")}</ul>

            <b>Risk:</b>
            <ul>${data.risk.map(r => `<li>${r}</li>`).join("")}</ul>

            <b>Actions:</b>
            <ul>${data.actions.map(a => `<li>${a}</li>`).join("")}</ul>

            <b>Message:</b> ${data.message}<br><br>
            <small>${data.timestamp}</small>
        `;

    } catch (err) {
        statusDiv.innerHTML = "🔴 Disconnected";
        outputDiv.innerHTML = "❌ Failed to connect to backend";
        console.error(err);
    }
}

</script>

</body>
</html>
