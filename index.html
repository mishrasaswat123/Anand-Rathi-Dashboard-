<!DOCTYPE html>
<html>
<head>
  <title>DSS Portfolio Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding: 20px; background:#0f172a; color:white;">

<h2>🚀 DSS Portfolio Intelligence</h2>

<button onclick="fetchPortfolio()" style="padding:10px; font-size:16px;">
  Run Strategy
</button>

<h3 id="summary"></h3>

<table border="1" cellpadding="10" style="margin-top:20px; border-collapse: collapse;">
  <thead>
    <tr>
      <th>Stock</th>
      <th>Allocation</th>
      <th>Sharpe</th>
      <th>Volatility</th>
      <th>Win Rate</th>
      <th>Drawdown</th>
      <th>Confidence</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<br>
<canvas id="pieChart" width="400" height="200"></canvas>

<script>
async function fetchPortfolio() {
  const res = await fetch("https://13.61.104.101.nip.io/api/portfolio");
  const data = await res.json();

  document.getElementById("summary").innerText =
    `Selected: ${data.totalSelected} | Universe: ${data.universeProcessed}`;

  const tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  const labels = [];
  const allocations = [];

  data.allocation.forEach(stock => {
    const row = `
      <tr>
        <td>${stock.stock}</td>
        <td>${stock.allocation}</td>
        <td>${stock.sharpe}</td>
        <td>${stock.volatility}</td>
        <td>${stock.winRate}</td>
        <td>${stock.drawdown}</td>
        <td>${stock.confidence}</td>
      </tr>
    `;
    tableBody.innerHTML += row;

    labels.push(stock.stock);
    allocations.push(parseFloat(stock.allocation));
  });

  new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: allocations
      }]
    }
  });
}
</script>

</body>
</html>
