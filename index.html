<!DOCTYPE html>
<html>
<head>
  <title>Trading Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background:#061a2f;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1 { margin-bottom:10px; }

    .card {
      background:#0f2b4c;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    .grid {
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .box {
      flex:1;
      min-width:150px;
      background:#132f55;
      padding:15px;
      border-radius:8px;
      text-align:center;
    }

    select {
      padding:8px;
      border-radius:6px;
      margin-bottom:15px;
    }

    canvas {
      background:#0f2b4c;
      border-radius:10px;
      padding:10px;
    }

    /* scrolling banner */
    #ticker {
      overflow:hidden;
      white-space:nowrap;
      color:orange;
      margin-bottom:10px;
    }

    #ticker span {
      display:inline-block;
      padding-left:100%;
      animation:scroll 12s linear infinite;
    }

    @keyframes scroll {
      from { transform:translateX(0); }
      to { transform:translateX(-100%); }
    }

    #price {
      font-size:28px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>📊 Trading Intelligence Dashboard</h1>

<div id="ticker">
  <span>⏳ Auto refresh every 30 seconds | Live market data</span>
</div>

<select id="stock">
  <option value="ANANDRATHI.NS">Anand Rathi</option>
  <option value="TCS.NS">TCS</option>
  <option value="RELIANCE.NS">Reliance</option>
</select>

<div class="card">
  <div id="price">Loading...</div>
</div>

<div class="card">
  <div id="signal"></div>
</div>

<div class="card grid">
  <div class="box">Next Hour<br><b id="hour"></b></div>
  <div class="box">Day 1<br><b id="day1"></b></div>
  <div class="box">Day 2<br><b id="day2"></b></div>
  <div class="box">Day 3<br><b id="day3"></b></div>
  <div class="box">Weekly<br><b id="week"></b></div>
</div>

<div class="card">
  Support: <span id="support"></span> |
  Resistance: <span id="resistance"></span>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
let chart;

async function loadData() {
  try {
    const symbol = document.getElementById("stock").value;

    const res = await fetch(`https://stock-api-cl5a.onrender.com/api/predict?symbol=${symbol}`);
    const data = await res.json();

    // price change
    const change = data.price - data.previousClose;
    const changePct = ((change / data.previousClose) * 100).toFixed(2);

    const priceEl = document.getElementById("price");

    priceEl.innerText =
      `₹${data.price.toFixed(2)} (${change.toFixed(2)} | ${changePct}%)`;

    priceEl.style.color = change >= 0 ? "lime" : "red";

    // signal
    document.getElementById("signal").innerText =
      `Signal: ${data.signal} | Bias: ${data.bias} | Risk: ${data.risk}`;

    // predictions
    document.getElementById("hour").innerText = "₹" + data.predictions.hourly;
    document.getElementById("day1").innerText = "₹" + data.predictions.day1;
    document.getElementById("day2").innerText = "₹" + data.predictions.day2;
    document.getElementById("day3").innerText = "₹" + data.predictions.day3;
    document.getElementById("week").innerText = "₹" + data.predictions.weekly;

    // levels
    document.getElementById("support").innerText = "₹" + data.support;
    document.getElementById("resistance").innerText = "₹" + data.resistance;

    // chart
    const forecast = data.predictions.hourlySeries || [];
    const labels = forecast.map((_, i) => "T+" + i);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Forecast",
          data: forecast,
          borderColor: "orange",
          borderDash: [5,5],
          tension: 0.4
        }]
      },
      options: {
        animation: false,
        responsive: true,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        },
        elements: {
          point: { radius: 0 }
        }
      }
    });

  } catch (err) {
    console.error(err);
    document.getElementById("price").innerText = "Error loading data";
  }
}

// reload
document.getElementById("stock").addEventListener("change", loadData);
loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
