<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Forecast Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .buy { color: #22c55e; }
    .sell { color: #ef4444; }

    canvas {
      margin-top: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>📈 Stock Forecast Dashboard</h1>

  <div class="container">

    <input id="symbol" placeholder="Enter stock (e.g. RELIANCE)">
    <button onclick="getPrediction()">Predict</button>

    <div id="result" class="card" style="display:none;">
      <div class="row"><span>Price:</span><span id="price"></span></div>
      <div class="row"><span>Signal:</span><span id="signal"></span></div>
      <div class="row"><span>Bias:</span><span id="bias"></span></div>
      <div class="row"><span>Risk:</span><span id="risk"></span></div>
      <div class="row"><span>Support:</span><span id="support"></span></div>
      <div class="row"><span>Resistance:</span><span id="resistance"></span></div>
    </div>

    <canvas id="chart" height="100"></canvas>

  </div>

<script>

const API_URL = "http://13.61.104.101:10000/api/predict";

let chart;

async function getPrediction() {
  const symbol = document.getElementById("symbol").value;

  if (!symbol) {
    alert("Enter stock symbol");
    return;
  }

  try {
    const res = await fetch(`${API_URL}?symbol=${symbol}`);
    const data = await res.json();

    document.getElementById("result").style.display = "block";

    document.getElementById("price").innerText = data.price;
    document.getElementById("signal").innerText = data.signal;
    document.getElementById("bias").innerText = data.bias;
    document.getElementById("risk").innerText = data.risk;
    document.getElementById("support").innerText = data.support;
    document.getElementById("resistance").innerText = data.resistance;

    // color signal
    const signalEl = document.getElementById("signal");
    signalEl.className = data.signal === "BUY" ? "buy" : "sell";

    renderChart(data.predictions.hourlySeries);

  } catch (err) {
    alert("Error fetching data");
    console.error(err);
  }
}

function renderChart(series) {
  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: series.map((_, i) => i + 1),
      datasets: [{
        label: "Price Trend",
        data: series,
        borderWidth: 2,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#000" }
        }
      }
    }
  });
}

</script>

</body>
</html>
