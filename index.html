<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSS Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1c2742;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .status {
      font-size: 18px;
      margin-top: 10px;
    }

    .btn {
      background: #3b82f6;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .output {
      background: #1c2742;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      text-align: left;
    }

    .red { color: red; }
    .green { color: #22c55e; }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>📡 Live DSS Engine</h2>
    <div id="status" class="status red">● Disconnected</div>
  </div>

  <button class="btn" onclick="runDSS()">Run DSS</button>

  <div id="output" class="output"></div>

</div>

<script>

// ✅ FINAL WORKING API (NGROK HTTPS)
const API = "https://gutless-mongoose-perfectly.ngrok-free.app/brain";


// ===== RUN DSS =====
async function runDSS() {

  const statusEl = document.getElementById("status");
  const outputEl = document.getElementById("output");

  statusEl.innerHTML = "⏳ Connecting...";
  statusEl.className = "status";

  try {

    const payload = {
      liquidity: "STRONG",
      rates: "RISING",
      crude: "RISING",
      fii: "SELLING"
    };

    const response = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) throw new Error("API failed");

    const data = await response.json();

    statusEl.innerHTML = "🟢 Connected";
    statusEl.className = "status green";

    renderOutput(data);

  } catch (err) {
    statusEl.innerHTML = "🔴 Disconnected";
    statusEl.className = "status red";

    outputEl.innerHTML = "❌ Failed to connect to backend";
    console.error(err);
  }
}


// ===== RENDER OUTPUT =====
function renderOutput(data) {

  const outputEl = document.getElementById("output");

  outputEl.innerHTML = `
    <h3>📊 DSS Recommendation</h3>

    <p><b>Call:</b> ${data.call?.join(", ") || ""}</p>
    <p><b>Horizon:</b> ${data.horizon || ""}</p>
    <p><b>Confidence:</b> ${data.confidence || ""}</p>

    <p><b>Reasons:</b></p>
    <ul>
      ${(data.reasons || []).map(r => `<li>${r}</li>`).join("")}
    </ul>

    <p><b>Impact:</b></p>
    <ul>
      ${(data.impact || []).map(i => `<li>${i}</li>`).join("")}
    </ul>

    <p><b>Risks:</b></p>
    <ul>
      ${(data.risk || []).map(r => `<li>${r}</li>`).join("")}
    </ul>

    <p><b>Actions:</b></p>
    <ul>
      ${(data.actions || []).map(a => `<li>${a}</li>`).join("")}
    </ul>

    <p><b>Message:</b> ${data.message || ""}</p>
    <p><b>Timestamp:</b> ${data.timestamp || ""}</p>
  `;
}

</script>

</body>
</html>
