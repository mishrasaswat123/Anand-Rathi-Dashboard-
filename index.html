<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DSS Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      text-align: center;
    }

    .card h2 {
      margin: 0;
      font-size: 18px;
    }

    .card p {
      font-size: 24px;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      margin-bottom: 30px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #334155;
    }

    .error {
      text-align: center;
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>📊 DSS Trading Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>Total PnL</h2>
      <p id="totalPnl">0</p>
    </div>
    <div class="card">
      <h2>Realized PnL</h2>
      <p id="realizedPnl">0</p>
    </div>
    <div class="card">
      <h2>Unrealized PnL</h2>
      <p id="unrealizedPnl">0</p>
    </div>
  </div>

  <h2>📦 Positions</h2>
  <table>
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Qty</th>
        <th>Avg Price</th>
        <th>Last Price</th>
        <th>PnL</th>
      </tr>
    </thead>
    <tbody id="positions"></tbody>
  </table>

  <h2>📜 Trade History</h2>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Symbol</th>
        <th>Action</th>
        <th>Qty</th>
        <th>Price</th>
        <th>PnL</th>
      </tr>
    </thead>
    <tbody id="trades"></tbody>
  </table>

  <div id="error" class="error"></div>

  <script>
    const API_URL = "http://13.61.104.101:4000";

    async function loadData() {
      try {
        document.getElementById("error").innerText = "";

        const res = await fetch(`${API_URL}/portfolio`);
        const data = await res.json();

        // PnL
        const realized = data.realizedPnl || 0;
        const unrealized = data.unrealizedPnl || 0;
        const total = realized + unrealized;

        document.getElementById("realizedPnl").innerText = realized.toFixed(2);
        document.getElementById("unrealizedPnl").innerText = unrealized.toFixed(2);
        document.getElementById("totalPnl").innerText = total.toFixed(2);

        // Positions
        const positionsEl = document.getElementById("positions");
        positionsEl.innerHTML = "";

        for (let symbol in data.positions || {}) {
          const p = data.positions[symbol];

          positionsEl.innerHTML += `
            <tr>
              <td>${symbol}</td>
              <td>${p.qty}</td>
              <td>${p.avgPrice}</td>
              <td>${p.lastPrice}</td>
              <td>${p.pnl}</td>
            </tr>
          `;
        }

        // Trades
        const tradesEl = document.getElementById("trades");
        tradesEl.innerHTML = "";

        (data.trades || []).slice().reverse().forEach(t => {
          tradesEl.innerHTML += `
            <tr>
              <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
              <td>${t.symbol}</td>
              <td>${t.action}</td>
              <td>${t.qty}</td>
              <td>${t.price}</td>
              <td>${t.pnl || 0}</td>
            </tr>
          `;
        });

      } catch (err) {
        document.getElementById("error").innerText =
          "❌ Cannot connect to backend (CORS / API down)";
      }
    }

    // Auto refresh every 2 sec
    setInterval(loadData, 2000);
    loadData();
  </script>

</body>
</html>
