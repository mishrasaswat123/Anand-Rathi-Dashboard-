<!DOCTYPE html>
<html>
<head>
    <title>DSS Trading Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            background: #1e293b;
            text-align: center;
        }

        .green { color: #22c55e; }
        .red { color: #ef4444; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #334155;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>📊 DSS Trading Dashboard</h1>

<div class="cards">
    <div class="card">
        <h3>Total PnL</h3>
        <h2 id="totalPnL">0</h2>
    </div>
    <div class="card">
        <h3>Realized PnL</h3>
        <h2 id="realizedPnL">0</h2>
    </div>
    <div class="card">
        <h3>Unrealized PnL</h3>
        <h2 id="unrealizedPnL">0</h2>
    </div>
</div>

<div class="section">
    <h2>📦 Positions</h2>
    <table id="positionsTable">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Qty</th>
                <th>Avg Price</th>
                <th>Last Price</th>
                <th>PnL</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="section">
    <h2>📜 Trade History</h2>
    <table id="tradesTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Symbol</th>
                <th>Action</th>
                <th>Qty</th>
                <th>Price</th>
                <th>PnL</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const API_BASE = "http://13.61.104.101:4000";

function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString();
}

function setColor(el, value) {
    el.classList.remove('green', 'red');
    el.classList.add(value >= 0 ? 'green' : 'red');
}

async function loadPortfolio() {
    try {
        const res = await fetch(API_BASE + '/portfolio');
        const data = await res.json();

        // PnL Cards
        document.getElementById('totalPnL').innerText = data.totalPnL.toFixed(2);
        document.getElementById('realizedPnL').innerText = data.realizedPnL.toFixed(2);
        document.getElementById('unrealizedPnL').innerText = data.unrealizedPnL.toFixed(2);

        setColor(document.getElementById('totalPnL'), data.totalPnL);
        setColor(document.getElementById('realizedPnL'), data.realizedPnL);
        setColor(document.getElementById('unrealizedPnL'), data.unrealizedPnL);

        // Positions Table
        const tbody = document.querySelector('#positionsTable tbody');
        tbody.innerHTML = '';

        for (let symbol in data.positions) {
            const p = data.positions[symbol];

            const row = `
                <tr>
                    <td>${symbol}</td>
                    <td>${p.qty}</td>
                    <td>${p.avgPrice.toFixed(2)}</td>
                    <td>${p.lastPrice.toFixed(2)}</td>
                    <td class="${p.pnl >= 0 ? 'green' : 'red'}">${p.pnl.toFixed(2)}</td>
                </tr>
            `;

            tbody.innerHTML += row;
        }

    } catch (err) {
        console.error('Portfolio error', err);
    }
}

async function loadTrades() {
    try {
        const res = await fetch(API_BASE + '/trades');
        const data = await res.json();

        const tbody = document.querySelector('#tradesTable tbody');
        tbody.innerHTML = '';

        data.slice().reverse().forEach(t => {
            const row = `
                <tr>
                    <td>${formatTime(t.timestamp)}</td>
                    <td>${t.symbol}</td>
                    <td>${t.action}</td>
                    <td>${t.qty}</td>
                    <td>${t.price}</td>
                    <td class="${t.pnl >= 0 ? 'green' : 'red'}">${t.pnl ? t.pnl.toFixed(2) : '-'}</td>
                </tr>
            `;

            tbody.innerHTML += row;
        });

    } catch (err) {
        console.error('Trades error', err);
    }
}

function refresh() {
    loadPortfolio();
    loadTrades();
}

// Auto refresh every 3 seconds
setInterval(refresh, 3000);

// Initial load
refresh();
</script>

</body>
</html>
