<!DOCTYPE html>

<html>
<head>
    <title>Trading Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

```
<style>
    body { background:#061a2f; color:white; font-family:Arial; padding:20px; }
    .card { background:#0f2b4c; padding:20px; border-radius:10px; margin-bottom:20px; }
    .grid { display:flex; gap:15px; flex-wrap:wrap; }
    .box { flex:1; min-width:150px; background:#132f55; padding:15px; border-radius:8px; text-align:center; }
    select { padding:6px; margin-bottom:10px; }
    canvas { background:#0f2b4c; border-radius:10px; }
</style>
```

</head>

<body>

<h1>📊 Trading Intelligence Dashboard</h1>

<select id="stock">
    <option value="ANANDRATHI.NS">Anand Rathi</option>
    <option value="TCS.NS">TCS</option>
    <option value="RELIANCE.NS">Reliance</option>
</select>

<div class="card" id="priceBox">Loading...</div>

<div class="card" id="signalBox"></div>

<div class="card grid">
    <div class="box" id="hourly"></div>
    <div class="box" id="day1"></div>
    <div class="box" id="day2"></div>
    <div class="box" id="day3"></div>
    <div class="box" id="weekly"></div>
</div>

<div class="card" id="levels"></div>

<div class="card">
    <h3 id="chartTitle">Loading chart...</h3>
    <canvas id="chart"></canvas>
</div>

<script>

let chart;

function getMarketPhase() {
    const now = new Date();
    const hour = now.getHours();
    const min = now.getMinutes();

    const current = hour * 60 + min;

    if (current >= 555 && current <= 930) return "LIVE";        // 9:15–3:30
    if (current > 930 && current < 990) return "POST";          // 3:30–4:30
    return "FORECAST";                                          // after 4:30
}

function getChartTitle() {
    const phase = getMarketPhase();
    const today = new Date().toLocaleDateString();
    const tomorrow = new Date(Date.now()+86400000).toLocaleDateString();

    if (phase === "LIVE") return "Live Market Intraday - " + today;
    if (phase === "POST") return "Post Market - " + today;
    return "Forecast for - " + tomorrow;
}

async function loadData() {
    try {
        const symbol = document.getElementById("stock").value;
        const res = await fetch(`https://stock-api-cl5a.onrender.com/api/predict?symbol=${symbol}`);
        const data = await res.json();

        document.getElementById("priceBox").innerHTML =
            `₹${data.price}<br>Market: ${getMarketPhase()}`;

        document.getElementById("signalBox").innerHTML =
            `Signal: ${data.signal}<br>Bias: ${data.bias}<br>Risk: ${data.risk}`;

        document.getElementById("hourly").innerHTML = `Next Hour<br>₹${data.predictions.hourly}`;
        document.getElementById("day1").innerHTML = `Day 1<br>₹${data.predictions.threeDay}`;
        document.getElementById("day2").innerHTML = `Day 2<br>₹${data.predictions.threeDay}`;
        document.getElementById("day3").innerHTML = `Day 3<br>₹${data.predictions.threeDay}`;
        document.getElementById("weekly").innerHTML = `Weekly<br>₹${data.predictions.weekly}`;

        document.getElementById("levels").innerHTML =
            `Support: ₹${data.support} | Resistance: ₹${data.resistance}`;

        renderChart(data.price, data.predictions.hourly);

    } catch (e) {
        document.getElementById("priceBox").innerHTML = "Data unavailable";
        console.error(e);
    }
}

function renderChart(price, forecast) {

    const phase = getMarketPhase();

    document.getElementById("chartTitle").innerText = getChartTitle();

    const labels = [];
    const actual = [];
    const forecastArr = [];

    if (phase === "FORECAST") {
        for (let i=0;i<10;i++) {
            labels.push("T+"+i);
            actual.push(null);
            forecastArr.push(price + i*2);
        }
    } else {
        for (let i=0;i<20;i++) {
            labels.push(i);
            actual.push(price + Math.random()*10 - 5);
        }
        for (let i=0;i<5;i++) {
            labels.push("F"+i);
            forecastArr.push(forecast + i*2);
        }
    }

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Actual',
                    data: actual,
                    borderColor: 'cyan'
                },
                {
                    label: 'Forecast',
                    data: forecastArr,
                    borderColor: 'orange',
                    borderDash: [5,5]
                }
            ]
        }
    });
}

document.getElementById("stock").addEventListener("change", loadData);

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
