<!DOCTYPE html>

<html>
<head>
    <title>Trading Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

```
<style>
    body { background:#061a2f; color:white; font-family:Arial; padding:20px; }
    .card { background:#0f2b4c; padding:20px; border-radius:10px; margin-bottom:20px; }
    .grid { display:flex; gap:15px; flex-wrap:wrap; }
    .box { flex:1; min-width:150px; background:#132f55; padding:15px; border-radius:8px; text-align:center; }
    canvas { background:#0f2b4c; border-radius:10px; padding:10px; }
</style>
```

</head>

<body>

<h1>📊 Trading Intelligence Dashboard</h1>

<select id="stock">
    <option value="ANANDRATHI.NS">Anand Rathi</option>
    <option value="TCS.NS">TCS</option>
    <option value="RELIANCE.NS">Reliance</option>
</select>

<div class="card" id="priceBox"></div>
<div class="card" id="signalBox"></div>

<div class="card grid">
    <div class="box" id="hourly"></div>
    <div class="box" id="day1"></div>
    <div class="box" id="day2"></div>
    <div class="box" id="day3"></div>
    <div class="box" id="weekly"></div>
</div>

<div class="card" id="levels"></div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<script>

let chart;

async function loadData() {
    const symbol = document.getElementById("stock").value;

    const res = await fetch(`https://stock-api-cl5a.onrender.com/api/predict?symbol=${symbol}`);
    const data = await res.json();

    document.getElementById("priceBox").innerHTML =
        `₹${data.price}`;

    document.getElementById("signalBox").innerHTML =
        `Signal: ${data.signal} | Bias: ${data.bias} | Risk: ${data.risk}`;

    document.getElementById("hourly").innerHTML = `Next Hour<br>₹${data.predictions.hourly}`;
    document.getElementById("day1").innerHTML = `Day 1<br>₹${data.predictions.threeDay}`;
    document.getElementById("day2").innerHTML = `Day 2<br>₹${data.predictions.threeDay}`;
    document.getElementById("day3").innerHTML = `Day 3<br>₹${data.predictions.threeDay}`;
    document.getElementById("weekly").innerHTML = `Weekly<br>₹${data.predictions.weekly}`;

    document.getElementById("levels").innerHTML =
        `Support: ₹${data.support} | Resistance: ₹${data.resistance}`;

    renderChart(data);
}

function renderChart(data) {

    const labels = [...data.timestamps, ...data.forecastSeries.map((_,i)=>"F+"+i)];

    const actualData = data.intraday;

    const forecastData = new Array(actualData.length).fill(null).concat(data.forecastSeries);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Actual',
                    data: actualData,
                    borderColor: 'cyan',
                    tension: 0.3
                },
                {
                    label: 'Forecast',
                    data: forecastData,
                    borderColor: 'orange',
                    borderDash: [6,6],
                    tension: 0.3
                }
            ]
        },
        options: {
            plugins: {
                legend: { labels: { color: 'white' } }
            },
            scales: {
                x: { ticks: { color: 'white', maxTicksLimit: 10 } },
                y: { ticks: { color: 'white' } }
            }
        }
    });
}

document.getElementById("stock").addEventListener("change", loadData);

loadData();
setInterval(loadData, 10000);

</script>

</body>
</html>
