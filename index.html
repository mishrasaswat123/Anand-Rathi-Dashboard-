<!DOCTYPE html>
<html>
<head>
  <title>Trading Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #061a2f;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 { margin-bottom: 5px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .banner {
      color: orange;
      font-size: 14px;
    }

    .card {
      background: #0f2b4c;
      padding: 20px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .grid {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .box {
      flex: 1;
      background: #173a63;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>📊 Trading Intelligence Dashboard</h1>
  <div class="banner">⏳ Auto refresh every 30 seconds | BSE Data</div>
</div>

<h3 id="marketLabel"></h3>

<select id="symbolSelect">
  <option value="RELIANCE">Reliance</option>
  <option value="TCS">TCS</option>
  <option value="INFY">Infosys</option>
</select>

<div class="card">
  <h2 id="price">Loading...</h2>
</div>

<div class="card">
  <b id="signal"></b>
</div>

<div class="card grid">
  <div class="box" id="hour"></div>
  <div class="box" id="day1"></div>
  <div class="box" id="day2"></div>
  <div class="box" id="day3"></div>
  <div class="box" id="week"></div>
</div>

<div class="card" id="support"></div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
const API_URL = "https://stock-api-cl5a.onrender.com/api/predict";

let chart;

// 🧠 Market label logic
function getMarketLabel() {
  const now = new Date();
  const hours = now.getHours();

  if (hours >= 9 && hours < 15) return "📈 Intraday Market";
  if (hours >= 15 && hours < 18) return "🌆 Post Market";
  return "🌙 Next Day Forecast";
}

// 📊 Fetch + render
async function loadData() {
  const symbol = document.getElementById("symbolSelect").value;

  try {
    const res = await fetch(`${API_URL}?symbol=${symbol}`);
    const data = await res.json();

    if (data.error) throw new Error("API failed");

    document.getElementById("price").innerHTML =
      `₹${data.price} <br><small>${symbol} (BSE)</small>`;

    document.getElementById("signal").innerText =
      `Signal: ${data.signal} | Bias: ${data.bias} | Risk: ${data.risk}`;

    document.getElementById("hour").innerHTML =
      `Next Hour<br>₹${data.predictions.hourly}`;

    document.getElementById("day1").innerHTML =
      `Day 1<br>₹${data.predictions.day1}`;

    document.getElementById("day2").innerHTML =
      `Day 2<br>₹${data.predictions.day2}`;

    document.getElementById("day3").innerHTML =
      `Day 3<br>₹${data.predictions.day3}`;

    document.getElementById("week").innerHTML =
      `Weekly<br>₹${data.predictions.weekly}`;

    document.getElementById("support").innerText =
      `Support: ₹${data.support} | Resistance: ₹${data.resistance}`;

    document.getElementById("marketLabel").innerText =
      getMarketLabel();

    updateChart(data.predictions.hourlySeries);

  } catch (err) {
    document.getElementById("price").innerText = "Error loading data";
  }
}

// 📉 Chart (NO flicker)
function updateChart(series) {
  const ctx = document.getElementById("chart").getContext("2d");

  const labels = series.map((_, i) => `T+${i}`);

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = series;
    chart.update();
    return;
  }

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Forecast",
        data: series,
        borderColor: "orange",
        borderDash: [5, 5],
        tension: 0.4
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: "white" } }
      },
      scales: {
        x: { ticks: { color: "white" } },
        y: { ticks: { color: "white" } }
      }
    }
  });
}

// 🔁 Auto refresh (stable)
setInterval(loadData, 30000);

document.getElementById("symbolSelect").addEventListener("change", loadData);

// 🚀 Initial load
loadData();
</script>

</body>
</html>
