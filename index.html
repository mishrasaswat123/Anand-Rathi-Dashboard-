<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Advisor Brain Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
    }

    .highlight {
      background: #22c55e;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .risk {
      color: #ef4444;
      font-weight: bold;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
  </style></head><body>
<div class="container">  <div class="card">
    <h2>📢 TODAY'S CALL</h2>
    <div id="call"></div>
    <p><b>Horizon:</b> <span id="horizon"></span></p>
    <p><b>Confidence:</b> <span id="confidence"></span></p>
  </div>  <div class="card">
    <h2>🧠 Why this call?</h2>
    <ul id="reasons"></ul>
  </div>  <div class="card">
    <h2>🔗 Impact Chain</h2>
    <ul id="impact"></ul>
  </div>  <div class="card">
    <h2>⚠️ Risk</h2>
    <ul id="risk"></ul>
  </div>  <div class="card">
    <h2>📩 Client Message</h2>
    <p id="message"></p>
    <button onclick="copyMessage()">Copy Message</button>
  </div></div><script>

const API = "http://YOUR-EC2-IP:5000/brain"; // 🔴 CHANGE THIS

async function loadData() {
  const res = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      liquidity: "STRONG",
      rates: "RISING",
      crude: "RISING",
      fii: "SELLING"
    })
  });

  const data = await res.json();

  // CALL
  const callDiv = document.getElementById("call");
  callDiv.innerHTML = "";
  data.call.forEach(c => {
    const div = document.createElement("div");
    div.className = "highlight";
    div.innerText = c;
    callDiv.appendChild(div);
  });

  // BASIC
  document.getElementById("horizon").innerText = data.horizon;
  document.getElementById("confidence").innerText = data.confidence;

  // LIST HELPERS
  function fillList(id, arr) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    arr.forEach(item => {
      const li = document.createElement("li");
      li.innerText = item;
      el.appendChild(li);
    });
  }

  fillList("reasons", data.reasons);
  fillList("impact", data.impact);
  fillList("risk", data.risk);

  document.getElementById("message").innerText = data.message;
}

function copyMessage() {
  const text = document.getElementById("message").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

loadData();

</script></body>
</html>
