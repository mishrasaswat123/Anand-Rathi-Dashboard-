<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DSS Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #334155;
    }

    .status {
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>📊 DSS Trading Dashboard</h1>
<div class="status" id="status">Connecting...</div>

<div class="card">
  <h2>Total PnL</h2>
  <div id="total">0</div>
</div>

<div class="card">
  <h2>Realized</h2>
  <div id="realized">0</div>
</div>

<div class="card">
  <h2>Unrealized</h2>
  <div id="unrealized">0</div>
</div>

<h2>📦 Positions</h2>
<table>
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Qty</th>
      <th>Avg Price</th>
      <th>Last Price</th>
    </tr>
  </thead>
  <tbody id="positions"></tbody>
</table>

<h2>📜 Trades</h2>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Symbol</th>
      <th>Action</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody id="trades"></tbody>
</table>

<script>
const API = "https://13.61.104.101"; // ✅ IMPORTANT

async function loadData() {
  try {
    const res = await fetch(API + "/portfolio");
    const data = await res.json();

    document.getElementById("status").innerHTML = "🟢 Connected";

    document.getElementById("total").innerText =
      data.realizedPnL + data.unrealizedPnL;

    document.getElementById("realized").innerText = data.realizedPnL;
    document.getElementById("unrealized").innerText = data.unrealizedPnL;

    const posTable = document.getElementById("positions");
    posTable.innerHTML = "";

    Object.entries(data.positions).forEach(([symbol, p]) => {
      posTable.innerHTML += `
        <tr>
          <td>${symbol}</td>
          <td>${p.qty}</td>
          <td>${p.avgPrice}</td>
          <td>${p.lastPrice}</td>
        </tr>`;
    });

    const tradeTable = document.getElementById("trades");
    tradeTable.innerHTML = "";

    data.trades.slice().reverse().forEach(t => {
      tradeTable.innerHTML += `
        <tr>
          <td>${new Date(t.time).toLocaleTimeString()}</td>
          <td>${t.symbol}</td>
          <td>${t.action}</td>
          <td>${t.qty}</td>
          <td>${t.price}</td>
        </tr>`;
    });

  } catch (err) {
    document.getElementById("status").innerHTML =
      "🔴 Backend disconnected";
  }
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
