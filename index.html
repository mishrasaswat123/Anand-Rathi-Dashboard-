<!DOCTYPE html>
<html>
<head>
  <title>DSS Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .status {
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 160px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin: 10px 0 0 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }

    th {
      background: #334155;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

  </style>
</head>

<body>

<h1>📊 DSS Trading Dashboard</h1>

<div id="status" class="status">🟡 Connecting...</div>

<div class="cards">
  <div class="card">
    <h3>Total PnL</h3>
    <h2 id="totalPnL">0</h2>
  </div>

  <div class="card">
    <h3>Realized</h3>
    <h2 id="realizedPnL">0</h2>
  </div>

  <div class="card">
    <h3>Unrealized</h3>
    <h2 id="unrealizedPnL">0</h2>
  </div>
</div>

<h2>📦 Positions</h2>
<table>
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Qty</th>
      <th>Avg</th>
      <th>Last</th>
      <th>PnL</th>
    </tr>
  </thead>
  <tbody id="positionsTable"></tbody>
</table>

<h2>📜 Trade History</h2>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Symbol</th>
      <th>Action</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody id="tradesTable"></tbody>
</table>

<script>

// 🔥 IMPORTANT: Your EC2 PUBLIC IP
const API_URL = "http://13.61.104.101:4000";

async function loadData() {
  try {
    const res = await fetch(`${API_URL}/portfolio`);
    const data = await res.json();

    console.log("LIVE DATA:", data);

    // Status
    document.getElementById("status").innerText = "🟢 Live";

    // PnL
    const total = data.realizedPnL + data.unrealizedPnL;

    document.getElementById("totalPnL").innerText = total.toFixed(2);
    document.getElementById("realizedPnL").innerText = data.realizedPnL.toFixed(2);
    document.getElementById("unrealizedPnL").innerText = data.unrealizedPnL.toFixed(2);

    // Positions
    const posTable = document.getElementById("positionsTable");
    posTable.innerHTML = "";

    Object.entries(data.positions).forEach(([symbol, p]) => {
      const pnl = (p.lastPrice - p.avgPrice) * p.qty;

      posTable.innerHTML += `
        <tr>
          <td>${symbol}</td>
          <td>${p.qty}</td>
          <td>${p.avgPrice}</td>
          <td>${p.lastPrice}</td>
          <td class="${pnl >= 0 ? 'green' : 'red'}">${pnl.toFixed(2)}</td>
        </tr>
      `;
    });

    // Trades
    const tradeTable = document.getElementById("tradesTable");
    tradeTable.innerHTML = "";

    data.trades.forEach(t => {
      tradeTable.innerHTML += `
        <tr>
          <td>${new Date(t.time).toLocaleTimeString()}</td>
          <td>${t.symbol}</td>
          <td>${t.action}</td>
          <td>${t.qty}</td>
          <td>${t.price}</td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "🔴 Backend disconnected (CORS / API issue)";
  }
}

// 🚀 AUTO REFRESH
setInterval(loadData, 2000);

// Initial load
loadData();

</script>

</body>
</html>
