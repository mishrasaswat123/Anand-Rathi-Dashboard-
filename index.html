<!DOCTYPE html>
<html>
<head>
  <title>DSS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
    }

    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #334155;
    }
  </style>
</head>

<body>

<h1>📊 DSS Trading Dashboard</h1>
<div id="status">Connecting...</div>

<div class="card">
  <h2>Total PnL</h2>
  <div id="total">0</div>
</div>

<div class="card">
  <h2>Realized</h2>
  <div id="realized">0</div>
</div>

<div class="card">
  <h2>Unrealized</h2>
  <div id="unrealized">0</div>
</div>

<h2>📦 Positions</h2>
<table>
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Qty</th>
      <th>Avg</th>
      <th>Last</th>
    </tr>
  </thead>
  <tbody id="positions"></tbody>
</table>

<h2>📜 Trades</h2>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Symbol</th>
      <th>Action</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody id="trades"></tbody>
</table>

<script>
const API = "https://13.61.104.101";

async function loadData() {
  try {
    const res = await fetch(API + "/portfolio");
    const data = await res.json();

    console.log("DATA:", data);

    // STATUS
    document.getElementById("status").innerHTML = "🟢 Connected";

    // PnL
    document.getElementById("total").innerText =
      (data.realizedPnL || 0) + (data.unrealizedPnL || 0);

    document.getElementById("realized").innerText = data.realizedPnL || 0;
    document.getElementById("unrealized").innerText = data.unrealizedPnL || 0;

    // POSITIONS
    const posTable = document.getElementById("positions");
    posTable.innerHTML = "";

    if (!data.positions || Object.keys(data.positions).length === 0) {
      posTable.innerHTML = "<tr><td colspan='4'>No positions</td></tr>";
    } else {
      for (const symbol in data.positions) {
        const p = data.positions[symbol];

        const row = `
          <tr>
            <td>${symbol}</td>
            <td>${p.qty}</td>
            <td>${p.avgPrice}</td>
            <td>${p.lastPrice}</td>
          </tr>
        `;

        posTable.innerHTML += row;
      }
    }

    // TRADES
    const tradeTable = document.getElementById("trades");
    tradeTable.innerHTML = "";

    if (data.trades && data.trades.length > 0) {
      data.trades.slice().reverse().forEach(t => {
        tradeTable.innerHTML += `
          <tr>
            <td>${new Date(t.time).toLocaleTimeString()}</td>
            <td>${t.symbol}</td>
            <td>${t.action}</td>
            <td>${t.qty}</td>
            <td>${t.price}</td>
          </tr>
        `;
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerHTML = "🔴 Backend error";
  }
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
