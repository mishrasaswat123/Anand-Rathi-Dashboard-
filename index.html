<!DOCTYPE html>
<html>
<head>
  <title>DSS Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial;
      background: #0b1a2f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .card {
      background: #1e2a3a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 150px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    th {
      background: #2c3e50;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>📊 DSS Trading Dashboard</h1>

<div class="cards">
  <div class="card">
    <h3>Total PnL</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Realized</h3>
    <p id="realized">0</p>
  </div>
  <div class="card">
    <h3>Unrealized</h3>
    <p id="unrealized">0</p>
  </div>
</div>

<h2>📦 Positions</h2>
<table>
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Qty</th>
      <th>Avg Price</th>
      <th>Last Price</th>
      <th>PnL</th>
    </tr>
  </thead>
  <tbody id="positions"></tbody>
</table>

<h2>📜 Trade History</h2>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Symbol</th>
      <th>Action</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
  </thead>
  <tbody id="trades"></tbody>
</table>

<div id="error" class="error"></div>

<script>
  // 🔥 HTTPS READY (will work AFTER nginx SSL setup)
  const API_URL = "https://13.61.104.101";

  async function loadData() {
    try {
      const res = await fetch(API_URL + "/portfolio");
      const data = await res.json();

      document.getElementById("realized").innerText = data.realizedPnL;
      document.getElementById("unrealized").innerText = data.unrealizedPnL;
      document.getElementById("total").innerText =
        data.realizedPnL + data.unrealizedPnL;

      // Positions
      const posTable = document.getElementById("positions");
      posTable.innerHTML = "";

      for (let sym in data.positions) {
        let p = data.positions[sym];
        let pnl = (p.lastPrice - p.avgPrice) * p.qty;

        posTable.innerHTML += `
          <tr>
            <td>${sym}</td>
            <td>${p.qty}</td>
            <td>${p.avgPrice.toFixed(2)}</td>
            <td>${p.lastPrice}</td>
            <td>${pnl.toFixed(2)}</td>
          </tr>
        `;
      }

      // Trades
      const tradeTable = document.getElementById("trades");
      tradeTable.innerHTML = "";

      data.trades.slice().reverse().forEach(t => {
        tradeTable.innerHTML += `
          <tr>
            <td>${t.time}</td>
            <td>${t.symbol}</td>
            <td>${t.action}</td>
            <td>${t.qty}</td>
            <td>${t.price}</td>
          </tr>
        `;
      });

      document.getElementById("error").innerText = "";

    } catch (e) {
      document.getElementById("error").innerText =
        "❌ Cannot connect to backend (HTTPS not configured yet)";
    }
  }

  loadData();
  setInterval(loadData, 3000);
</script>

</body>
</html>
