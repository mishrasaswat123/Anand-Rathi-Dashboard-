<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advisor Intelligence Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e2e8f0;
}

.container {
  padding: 16px;
}

/* SECTION BASE */
.section {
  background: #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

/* THEME STRIP */
.theme-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.theme-card {
  min-width: 140px;
  padding: 10px;
  border-radius: 10px;
  background: #334155;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.amber { color: #f59e0b; }

/* RISK */
.risk-high { color: #ef4444; font-weight: bold; }
.risk-medium { color: #f59e0b; }
.risk-low { color: #22c55e; }

/* ACTION */
.action-item {
  margin-bottom: 8px;
}

/* BUTTON */
button {
  padding: 8px 12px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* HEADER */
.header {
  font-size: 20px;
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- MARKET THEMES -->
  <div class="section">
    <div class="header">Market Themes</div>
    <div id="themes" class="theme-strip"></div>
  </div>

  <!-- RISK RADAR -->
  <div class="section">
    <div class="header">Client Risk Radar</div>
    <div id="risk"></div>
  </div>

  <!-- ACTION BOARD -->
  <div class="section">
    <div class="header">Advisor Actions</div>
    <div id="actions"></div>
  </div>

  <!-- NARRATIVE -->
  <div class="section">
    <div class="header">Client Communication</div>
    <div id="narrative"></div>
    <br/>
    <button onclick="copyText()">Copy Message</button>
  </div>

  <!-- CHANGES -->
  <div class="section">
    <div class="header">What Changed Today</div>
    <div id="changes"></div>
  </div>

  <!-- PORTFOLIO -->
  <div class="section">
    <div class="header">Portfolio Snapshot</div>
    <div id="portfolio"></div>
  </div>

</div>

<script>

// ===== MOCK DATA (Fallback) =====
const mockData = {
  themes: [
    { name: "Liquidity", direction: "↑ Strong", color: "green" },
    { name: "Interest Rates", direction: "↑ Rising", color: "red" },
    { name: "Crude", direction: "↑ Risk", color: "amber" },
    { name: "INR", direction: "↓ Weak", color: "green" },
    { name: "Market", direction: "↑ Bullish", color: "green" }
  ],
  risk: {
    level: "HIGH",
    reasons: [
      "NBFC exposure high (20%)",
      "Interest rates rising",
      "Crude adding pressure"
    ]
  },
  actions: [
    "Reduce NBFC exposure by 5%",
    "Increase PSU Bank allocation",
    "Hold IT (INR benefit)"
  ],
  narrative: "Given rising interest rates and crude pressure, we recommend reducing NBFC exposure and increasing allocation to PSU banks.",
  changes: [
    "Crude moved → Risk",
    "FII turned seller"
  ],
  portfolio: {
    Banking: "30%",
    NBFC: "20%",
    IT: "15%"
  }
};


// ===== RENDER FUNCTIONS =====

function renderThemes(themes) {
  const el = document.getElementById("themes");
  el.innerHTML = "";
  themes.forEach(t => {
    el.innerHTML += `
      <div class="theme-card">
        <div>${t.name}</div>
        <div class="${t.color}">${t.direction}</div>
      </div>
    `;
  });
}

function renderRisk(risk) {
  const el = document.getElementById("risk");
  el.innerHTML = `
    <div class="risk-high">Risk: ${risk.level}</div>
    <ul>
      ${risk.reasons.map(r => `<li>${r}</li>`).join("")}
    </ul>
  `;
}

function renderActions(actions) {
  const el = document.getElementById("actions");
  el.innerHTML = actions.map(a => `<div class="action-item">✔ ${a}</div>`).join("");
}

function renderNarrative(text) {
  document.getElementById("narrative").innerText = text;
}

function renderChanges(changes) {
  document.getElementById("changes").innerHTML =
    changes.map(c => `<div>- ${c}</div>`).join("");
}

function renderPortfolio(p) {
  document.getElementById("portfolio").innerHTML =
    Object.entries(p).map(([k,v]) => `<div>${k}: ${v}</div>`).join("");
}

function copyText() {
  const text = document.getElementById("narrative").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}


// ===== LOAD DATA =====

async function loadDashboard() {
  try {
    const res = await fetch("http://YOUR_EC2_IP:4000/dashboard");
    const data = await res.json();
    renderAll(data);
  } catch (e) {
    console.log("Using mock data");
    renderAll(mockData);
  }
}

function renderAll(data) {
  renderThemes(data.themes);
  renderRisk(data.risk);
  renderActions(data.actions);
  renderNarrative(data.narrative);
  renderChanges(data.changes);
  renderPortfolio(data.portfolio);
}

loadDashboard();

</script>

</body>
</html>
